name: github-release

on:
  workflow_dispatch:
    inputs:
      version:
        default: "auto"
        description: "The version for the release. Use auto for conventional commit auto calculation"
        required: true

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@6b71882a90b71468a66605f934ef75a83bbe006b # 2.0.25
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
