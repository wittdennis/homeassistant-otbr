name: github-release

on:
  workflow_dispatch:
    inputs:
      version:
        default: "auto"
        description: "The version for the release. Use auto for conventional commit auto calculation"
        required: true

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@4f985fb5d6ec854c23145f17cadd7261a1ff5415 # 2.0.38
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN }}
